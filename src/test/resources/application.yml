spring:
  application:
    name: quantdesk

server:
  port: 8080

quantdesk:
  backtest:
    starting-cash: 10000.00
  marketdata:
    provider: csv
  news:
    enabled: false
  sentiment:
    provider: lexicon
    model: claude-opus-4-8
  universe:
    file: data/universe.csv
    top-n: 2
    lookback-days: 5
    scan-interval-ms: 3600000
    scan-initial-delay-ms: 3600000
  trading:
    mode: "OFF"
    universe-mode: false
    symbols:
      - SAMPLE
    interval-ms: 60000
    initial-delay-ms: 60000
    strategy:
      fast: 10
      slow: 30
  risk:
    max-position-fraction: 0.2
    max-daily-loss-pct: 2.0
  ibkr:
    enabled: false
    base-url: "https://localhost:5000/v1/api"
    account-id: ""
