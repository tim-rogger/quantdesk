spring:
  application:
    name: quantdesk

server:
  port: 8080

quantdesk:
  backtest:
    starting-cash: 10000.00
  marketdata:
    provider: stooq
  news:
    enabled: true
  sentiment:
    provider: lexicon
    model: claude-opus-4-8
  universe:
    file: data/universe.csv
    top-n: 5
    lookback-days: 63
    scan-interval-ms: 900000
    scan-initial-delay-ms: 15000
  trading:
    mode: DRY_RUN
    universe-mode: true
    symbols:
      - AAPL.US
      - MSFT.US
    interval-ms: 60000
    initial-delay-ms: 60000
    strategy:
      fast: 10
      slow: 30
  risk:
    max-position-fraction: 0.2
    max-daily-loss-pct: 2.0
  ibkr:
    enabled: false
    base-url: "https://localhost:5000/v1/api"
    account-id: ""
